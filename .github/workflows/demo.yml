name: Update Demo GIF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tests/vhs/demo.tape"
      - "tests/vhs/_setup.tape"

permissions:
  contents: write
  pull-requests: write

jobs:
  demo:
    name: Regenerate demo GIF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          # ttyd
          sudo curl -fsSL -o /usr/local/bin/ttyd "https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64"
          sudo chmod +x /usr/local/bin/ttyd
          # vhs
          go install github.com/charmbracelet/vhs@latest

      - name: Build jara
        run: make build-vhs

      - name: Generate demo GIF
        run: JARA_ROOT="${{ github.workspace }}" vhs tests/vhs/demo.tape

      - name: Create PR with updated GIF
        run: |
          git add doc/demo.gif
          if git diff --cached --quiet; then
            echo "No changes to demo GIF"
            exit 0
          fi
          BRANCH="auto/update-demo-gif"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -m "doc: update demo GIF [skip ci]"
          git push -f origin "$BRANCH"
          if ! gh pr list --head "$BRANCH" --state open | grep -q .; then
            gh pr create --title "doc: update demo GIF" --body "Auto-generated from demo.tape changes." --head "$BRANCH" --base main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
