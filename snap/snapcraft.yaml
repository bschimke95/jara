name: jara
base: core24
adopt-info: jara
summary: Terminal UI for observing and interacting with Juju clusters
description: |
  Jara is a terminal user interface (TUI) to observe and interact with Juju
  clusters, inspired by k9s. It gives you a live, keyboard-driven overview of
  controllers, models, applications, units, machines, and relations without
  leaving the terminal.

license: AGPL-3.0
grade: stable
confinement: strict

platforms:
  amd64:
  arm64:

apps:
  jara:
    command: bin/jara
    plugs:
      - home
      - network
      - network-bind
      - dot-jara
      - dot-local-share-juju
      - dot-config-juju

plugs:
  dot-jara:
    interface: personal-files
    write:
      - $HOME/.jara
  dot-local-share-juju:
    interface: personal-files
    write:
      - $HOME/.local/share/juju
  dot-config-juju:
    interface: personal-files
    read:
      - $HOME/.config/juju

parts:
  jara:
    plugin: go
    source: .
    build-snaps:
      - go/latest/stable
    override-build: |
      if [ -f .version ]; then
        VERSION=$(cat .version)
      else
        VERSION=$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' || echo "dev")
      fi
      craftctl set version="${VERSION}"
      COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
      DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      go build \
        -ldflags "-w -s \
          -X github.com/bschimke95/jara/internal/cmd.version=${VERSION} \
          -X github.com/bschimke95/jara/internal/cmd.commit=${COMMIT} \
          -X github.com/bschimke95/jara/internal/cmd.date=${DATE}" \
        -o "${CRAFT_PART_INSTALL}/bin/jara" \
        ./cmd/jara
