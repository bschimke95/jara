name: Update Demo GIF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tests/vhs/demo.tape"
      - "tests/vhs/_setup.tape"

permissions:
  contents: write

jobs:
  demo:
    name: Regenerate demo GIF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Build jara
        run: make build-vhs

      - name: Generate demo GIF
        uses: charmbracelet/vhs-action@v2
        with:
          path: tests/vhs/demo.tape
          install-fonts: true
        env:
          JARA_ROOT: ${{ github.workspace }}

      - name: Commit and push updated GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/demo.gif
          if git diff --cached --quiet; then
            echo "No changes to demo GIF"
          else
            git commit -m "doc: update demo GIF [skip ci]"
            git push
          fi
