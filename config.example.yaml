# Jara Configuration
# Location: ~/.config/jara/config.yaml
#
# All values are optional. Unset keys use the compiled defaults.
# CLI flags (e.g. --refresh, --headless) override values in this file.

jara:
  # Status poll interval in seconds.
  # refreshRate: 3

  # Log level: error, warn, info, debug.
  # logLevel: info

  # Override the default log file path.
  # logFile: /tmp/jara.log

  # Hide the header panel.
  # headless: false

  # Hide the logo in the header.
  # logoless: false

  # Disable write operations (scale, etc.).
  # readOnly: false

  # Charmhub API base URL for deploy modal charm suggestions.
  # charmhubURL: https://api.charmhub.io

  # AI chat configuration for LLM-powered cluster analysis.
  # ai:
  #   # Provider: "copilot" (GitHub Copilot) or "gemini" (Google Gemini).
  #   provider: copilot
  #
  #   # Model override (default depends on provider).
  #   # model: gpt-4o
  #
  #   # Override the built-in system prompt.
  #   # systemPrompt: "You are a Juju expert..."
  #
  #   # Sampling temperature (0.0–2.0).
  #   # temperature: 0.7
  #
  #   # Maximum response tokens.
  #   # maxTokens: 4096
  #
  # Credentials are loaded from environment variables:
  #   copilot: GITHUB_TOKEN (or gh CLI config)
  #   gemini:  GOOGLE_AI_API_KEY or GEMINI_API_KEY

  ui:
    # Skin / color theme — Atom One Dark scheme.
    # All values are hex color strings (e.g. "#61afef").
    skin:
      # logoColor: "#61afef"
      # primary: "#61afef"
      # secondary: "#5c6370"
      # title: "#abb2bf"
      # subtle: "#4b5263"
      # highlight: "#3e4451"
      # muted: "#5c6370"
      # hintKey: "#e5c07b"
      # hintDesc: "#5c6370"
      # crumbFg: "#282c34"
      # crumbBg: "#61afef"
      # border: "#4b5263"
      # borderTitle: "#61afef"
      # infoLabel: "#5c6370"
      # infoValue: "#abb2bf"

      # Override colors for specific Juju status strings.
      # status:
      #   active: "#98c379"
      #   idle: "#98c379"
      #   running: "#98c379"
      #   started: "#98c379"
      #   blocked: "#e06c75"
      #   error: "#e06c75"
      #   lost: "#e06c75"
      #   down: "#e06c75"
      #   waiting: "#e5c07b"
      #   allocating: "#e5c07b"
      #   pending: "#e5c07b"
      #   maintenance: "#56b6c2"
      #   executing: "#56b6c2"
      #   terminated: "#5c6370"
      #   unknown: "#5c6370"
      #   stopped: "#d19a66"
      #   default: "#abb2bf"

    # Key binding overrides. Each binding is a list of key strings.
    # See https://pkg.go.dev/charm.land/bubbletea/v2#KeyPressMsg for key names.
    keys:
      # quit:
      #   keys: ["q", "ctrl+c"]
      # help:
      #   keys: ["?"]
      # back:
      #   keys: ["esc"]
      # enter:
      #   keys: ["enter"]
      # command:
      #   keys: [":"]
      # filter:
      #   keys: ["/"]
      # up:
      #   keys: ["k", "up"]
      # down:
      #   keys: ["j", "down"]
      # pageUp:
      #   keys: ["ctrl+u", "pgup"]
      # pageDown:
      #   keys: ["ctrl+d", "pgdown"]
      # top:
      #   keys: ["g"]
      # bottom:
      #   keys: ["G"]
      # cancelInput:
      #   keys: ["esc"]
      # tab:
      #   keys: ["tab"]
      # scaleUp:
      #   keys: ["+"]
      # scaleDown:
      #   keys: ["-"]
      # logsJump:
      #   keys: ["L"]
      # logsView:
      #   keys: ["l"]
      # clearFilter:
      #   keys: ["D"]
