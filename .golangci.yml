version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: var-naming
          disabled: true

formatters:
  enable:
    - gofumpt

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
